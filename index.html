3E%3Cpath%20d%3D%22M32%2020.5a11.5%2011.5%200%200%200%200%2023%2015%2015%200%200%201%200-23z%22%20fill%3D%22%237E5417%22%20opacity%3D%22.5%22%2F%3E%3Cg%20clip-path%3D%22url(%23front)%22%3E%3Cellipse%20cx%3D%2232%22%20cy%3D%2232%22%20rx%3D%2222%22%20ry%3D%227.6%22%20fill%3D%22none%22%20stroke%3D%22url(%23rg)%22%20stroke-width%3D%222.6%22%20transform%3D%22rotate(-18%2032%2032)%22%2F%3E%3C%2Fg%3E%3Cpath%20d%3D%22M49.5%2010.5l1.2%202.8%202.8%201.2-2.8%201.2-1.2%202.8-1.2-2.8-2.8-1.2%202.8-1.2z%22%20fill%3D%22%23EDE7D8%22%2F%3E%3Ccircle%20cx%3D%2214.5%22%20cy%3D%2217.5%22%20r%3D%222%22%20fill%3D%22%23C9CFD8%22%2F%3E%3Cpath%20d%3D%22M14.5%2015.7a1.8%201.8%200%200%200%200%203.6%202.3%202.3%200%200%201%200-3.6z%22%20fill%3D%22%238B93AD%22%2F%3E%3Ccircle%20cx%3D%2252%22%20cy%3D%2250%22%20r%3D%221.2%22%20fill%3D%22%238B93AD%22%2F%3E%3Ccircle%20cx%3D%2211%22%20cy%3D%2247%22%20r%3D%220.9%22%20fill%3D%22%236B7390%22%2F%3E%3C%2Fsvg%3E">
<link rel="stylesheet" href="celestial-simulator.css?v=202607201836">
</head>
<body>

<header>
  <div class="brand"><b id="brandTitle">觀星者</b><span>STARGZR</span><span id="authorTag">— by Ray King</span></div>
  <div class="ctl">
    <label for="dt" id="uiTime">時刻</label>
    <input type="datetime-local" id="dt" step="60">
    <button id="nowBtn">切到現在</button>
    <span id="lunarRead" style="color:var(--brass);font-size:11.5px;white-space:nowrap;">—</span>
  </div>
  <div class="ctl">
    <button id="playBtn" class="primary"><span class="glyph-play"></span><span id="playLbl">播放</span></button>
    <label for="speed" id="uiSpeed">速度</label>
    <select id="speed">
      <option value="3600000">1 小時 / 秒</option>
      <option value="7200000" selected>2 小時 / 秒</option>
      <option value="10800000">3 小時 / 秒</option>
      <option value="21600000">6 小時 / 秒</option>
      <option value="86400000">1 天 / 秒</option>
      <option value="259200000">3 天 / 秒</option>
      <option value="864000000">10 天 / 秒</option>
      <option value="-86400000">倒轉 1 天 / 秒</option>
    </select>
  </div>
  <div class="ctl">
    <label for="lat" id="uiLat">緯度</label><input type="number" id="lat" value="25.03" step="0.5" min="-89.9" max="89.9">
    <label for="lon" id="uiLon">經度</label><input type="number" id="lon" value="121.56" step="0.5" min="-180" max="180">
  </div>
  <div class="ctl"><button id="retroTableBtn">逆行時刻表</button></div>
  <div class="ctl">
    <select id="langSel"><option value="zh" selected>中文</option><option value="en">English</option></select>
    <button id="notifyBtn" title="通知開關 / Notifications">通知</button>
  </div>
  <button id="micBtn" title="AI 語音命令 / AI Voice">AI語音命令</button>
</header>

<main>
  <div class="pane" id="paneL">
    <div class="chip" id="chipL">日心視角 · SOLAR SYSTEM</div>
    <div class="zoomchip" id="eclipseChip" style="display:none;right:auto;left:12px;color:#FFB59F;border-color:rgba(255,138,107,.6);"></div>
    <div class="flyDock" id="flyDock" style="display:none">
      <div class="flyPad" id="flyPad">
        <button data-k="w" title="前進 (W)"><span class="kb">W</span><span class="ar"></span></button>
        <button data-k="a" title="左移 (A)"><span class="kb">A</span><span class="ar"></span></button>
        <button data-k="s" title="後退 (S)"><span class="kb">S</span><span class="ar"></span></button>
        <button data-k="d" title="右移 (D)"><span class="kb">D</span><span class="ar"></span></button>
      </div>
      <div class="flyExtra" id="flyExtra">
        <button id="homeBtn">回到原點</button>
        <label id="uiObserve" for="obsSel">觀察</label>
        <select id="obsSel"><option value="none" selected>—</option></select>
      </div>
    </div>
    <div class="overlay">
      <div class="row"><input type="checkbox" id="tidalChk"><label for="tidalChk" id="uiTidal">月球潮汐力示意</label></div>
      <div class="row"><input type="checkbox" id="phaseChk" checked><label for="phaseChk" id="uiPhase">月相與影錐</label></div>
      <div class="row"><input type="checkbox" id="sphereChk" checked><label for="sphereChk" id="uiSphere">天球與星座</label></div>
      <div class="row"><input type="checkbox" id="signChk"><label for="signChk" id="uiSign">十二宮區塊(隨歲差)</label></div>
      <div class="row"><input type="checkbox" id="extraConstChk"><label for="extraConstChk" id="uiExtraConst">其他星座</label></div>
      <div class="row">
        <label for="viewBodySel" id="uiViewBody">觀察地</label>
        <select id="viewBodySel">
          <option value="earth" selected>地球</option>
          <option value="moon">月球</option>
          <option value="mars">火星</option>
          <option value="titan">泰坦</option>
        </select>
      </div>
      <div class="row"><input type="checkbox" id="orbitChk" checked><label for="orbitChk" id="uiOrbit">軌道線</label></div>
      <div class="row"><input type="checkbox" id="scaleChk"><label for="scaleChk" id="uiScale">正確比例(距離線性)</label></div>
    </div>
  </div>
  <div class="pane" id="paneR">
    <div class="chip" id="chipR">地平視角 · SKY VIEW</div>
    <div class="overlay">
      <div class="row" id="retroRow">
        <label for="retroSel" id="uiTrail">逆行軌跡</label>
        <select id="retroSel">
          <option value="0" selected>水星</option>
          <option value="1">金星</option>
          <option value="3">火星</option>
          <option value="4">木星</option>
          <option value="5">土星</option>
          <option value="6">天王星</option>
          <option value="7">海王星</option>
          <option value="8">冥王星</option>
        </select>
        <input type="checkbox" id="trailChk"><label for="trailChk" id="uiShow">顯示</label>
        <span id="retroStatus" class="pro">—</span>
      </div>
      <div class="row">
        <label for="trackSel" id="uiTrack">軸置中</label>
        <select id="trackSel">
          <option value="off" selected>無置中</option>
          <option value="ecl_e">黃道軸・日出</option>
          <option value="ecl_w">黃道軸・日沒</option>
          <option value="lun_e">白道軸・月出</option>
          <option value="lun_w">白道軸・月沒</option>
        </select>
      </div>
      <div class="row">
        <label for="lockSel" id="uiLock">鎖定</label>
        <select id="lockSel">
          <option value="none" selected>無鎖定</option>
          <option value="sun">太陽</option>
          <option value="moon">月亮</option>
        </select>
        <span id="anchorHint" style="display:none;color:var(--cyan);font-size:10.5px;max-width:280px;">＊ 周日運動已凍結(等效每天同一時刻觀測):日夜循環與昇落暫停;地平線仍是該時刻的真實地平</span>
      </div>
      <div class="row">
        <input type="checkbox" id="constChk" checked><label for="constChk" id="uiConst">星座圖形</label>
        <input type="checkbox" id="eclLineChk"><label for="eclLineChk" id="uiEclLine">黃道/白道/天球赤道線</label>
      </div>
      <div class="row">
        <input type="checkbox" id="bgStarChk" checked><label for="bgStarChk" id="uiBgStar">背景星空</label>
        <input type="checkbox" id="dayChk" checked><label for="dayChk" id="uiDay">日夜背景變化</label>
      </div>
      <div class="row" id="trailFxRow" style="display:none">
        <input type="checkbox" id="trailFxChk"><label for="trailFxChk" id="uiTrailFx">運動殘影(星軌)</label>
      </div>
      <div class="row">
        <input type="checkbox" id="textChk" checked><label for="textChk" id="uiText">文字標籤</label>
        <input type="checkbox" id="hideHorChk"><label for="hideHorChk" id="uiHideHor">隱藏地平線</label>
        <input type="checkbox" id="invChk" checked><label for="invChk" id="uiInv">反向拖曳</label>
      </div>
    </div>
    <div class="zoomchip" id="zoomChip">視野 0.6×</div>
  </div>
</main>

<footer>
  <div><span id="uiFootTime">模擬時刻</span> <b id="timeReadout">—</b> · JD <b id="jdReadout">—</b> · <span id="uiFootLoc">觀測地</span> <b id="locReadout">25.03°N 121.56°E</b></div>
  <div class="hint" id="uiHint">拖曳旋轉 · 滾輪/雙指縮放 · 逆行軌跡:實線=過去 虛線=未來</div>
</footer>

<div id="toasts"></div>

<div id="modalBg">
  <div id="modal">
    <div class="mhead">
      <h2 id="uiModalTitle">行星逆行時刻表</h2>
      <div class="ynav">
        <button id="yPrev">‹</button><b id="yLbl">2026</b><button id="yNext">›</button>
        <button id="mClose">×</button>
      </div>
    </div>
    <div class="mbody"><table>
      <thead><tr><th id="thP">行星</th><th id="thS">開始逆行</th><th id="thE">恢復順行</th><th id="thD">期間</th></tr></thead>
      <tbody id="retroRows"></tbody>
    </table></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="celestial-simulator.js?v=202607201836"></script>
</body>
</html>
