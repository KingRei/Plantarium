name = "stargzr-ai"
main = "src/worker.js"
compatibility_date = "2026-01-01"
account_id = "5877a87bfbfca92ab863b26013c7e5ce"

[vars]
# Cloudflare Account ID（非機密）
CF_ACCOUNT_ID = "5877a87bfbfca92ab863b26013c7e5ce"
CF_GATEWAY_ID = "stargzr"
# 只允許你的網站呼叫（逗號分隔；設 * 表示不限，不建議）
ALLOWED_ORIGINS = "https://gazer.star-gzr.com,http://localhost:8888"

# 機密(Secret)不要寫在這個檔案。部署成「有程式碼的 Worker」後,
# 到儀表板 → 該 Worker → Settings → Variables and Secrets → Add,型別選 Secret:
#   CF_AIG_TOKEN     （Authenticated Gateway 用）
#   GROQ_API_KEY     （若非 BYOK 才需要）
#   GH_MODELS_TOKEN  （若非 BYOK 才需要）
# 或用 CLI:  npx wrangler secret put CF_AIG_TOKEN   （其餘同理）
# worker.js 已經會讀 env.CF_AIG_TOKEN / env.GROQ_API_KEY / env.GH_MODELS_TOKEN。
